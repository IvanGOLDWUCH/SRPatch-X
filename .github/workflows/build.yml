name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create Hardcore Signing Properties
        run: |
          touch test.jks
          # Запихиваем вообще все возможные названия переменных подписи
          echo "KEYSTORE_PATH=../test.jks" > signing.properties
          echo "storeFile=../test.jks" >> signing.properties
          
          echo "KEYSTORE_PASSWORD=password123" >> signing.properties
          echo "storePassword=password123" >> signing.properties
          
          echo "KEY_ALIAS=alias123" >> signing.properties
          echo "keyAlias=alias123" >> signing.properties
          
          echo "KEY_PASSWORD=password123" >> signing.properties
          echo "keyPassword=password123" >> signing.properties

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SRPatch-X-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          
